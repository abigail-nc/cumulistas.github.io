<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <div class="site-wrapper">

    <header>
      <div class="brand">{{ site.title }}</div>
      <nav>
        <a href="{{ '/' | relative_url }}">Inicio</a>
        <a href="{{ '/sobre-nosotros/' | relative_url }}">Sobre nosotros</a>
        <div class="menu-toggle"><i class="fa-solid fa-bars"></i></div>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

  </div>

  <footer>
    <div class="footer-container">
      <div class="footer-brand">{{ site.title }}</div>
      <div class="footer-nav">
        <a href="{{ '/sobre-nosotros/' | relative_url }}">Sobre nosotros</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/recursos/' | relative_url }}">Recursos</a>
        <a href="{{ '/pronostico/' | relative_url }}">Pronóstico</a>
      </div>
    </div>
  </footer>

</body>
</html>
